name: sync-images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Sync a single tag. Leave empty to sync all missing tags."
        required: false
        type: string
  schedule:
    - cron: "17 2 * * *"

permissions:
  contents: read
  packages: write

jobs:
  sync-images:
    name: Sync missing images
    runs-on: ubuntu-latest

    steps:
      - name: Setup arkade
        uses: alexellis/arkade-get@master
        with:
          crane: latest

      - name: Login to GHCR
        run: |
          echo "${{ github.token }}" | crane auth login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Sync images
        env:
          SOURCE_IMAGE: ghcr.io/skatolo/inlets-pro
          TARGET_IMAGE: ghcr.io/skatolo/inlets-pro-sync-e2e-test
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          if [ -n "${TAG}" ]; then
            source_tags="${TAG}"
          else
            source_tags="$(crane ls "${SOURCE_IMAGE}" | sort -V)"
          fi

          target_tags="$(crane ls "${TARGET_IMAGE}" | sort -V)"

          copied=0
          skipped=0

          {
            echo "### Image sync"
            echo
            echo "| Tag | Result |"
            echo "| --- | --- |"
          } >> "${GITHUB_STEP_SUMMARY}"

          for tag in ${source_tags}; do
            if echo "${target_tags}" | grep -Fxq "${tag}"; then
              echo "| \`${tag}\` | Already present |" >> "${GITHUB_STEP_SUMMARY}"
              skipped=$((skipped + 1))
              continue
            fi

            crane cp "${SOURCE_IMAGE}:${tag}" "${TARGET_IMAGE}:${tag}"
            echo "| \`${tag}\` | Copied |" >> "${GITHUB_STEP_SUMMARY}"
            copied=$((copied + 1))
          done

          {
            echo
            echo "Copied: ${copied}"
            echo "Skipped: ${skipped}"
          } >> "${GITHUB_STEP_SUMMARY}"
